services:
  tilda:
    image: ghcr.io/zzacal/tilda:v5.0.17-alpha
    container_name: user-tilda
    ports:
      - '8110:8110'
    volumes:
      - ../sample-seeds:/data/seeds/
      # Mount a host directory for captures so they survive restarts.
      # - ./captures:/data/captures/
    environment:
      # --- Server ---
      - PORT=8110
      # - MOCK_PATH=/__tilda/mock

      # --- Seed sources ---
      # - SEED=/data/seed.json
      # - SEEDS_DIR=/data/seeds/
      # - CAPTURES_DIR=/data/captures/

      # --- CORS ---
      # - CORS_ORIGIN=*
      # - CORS_DISABLE=false

      # --- Record / replay ---
      # - TILDA_MODE=replay              # replay | record | passthrough
      # - UPSTREAM=https://api.example.com   # required for record / passthrough
      # - CAPTURE_REDACT=X-API-Key,X-Internal-Token
      # - CAPTURE_ERRORS=false           # truthy = capture 4xx/5xx too
